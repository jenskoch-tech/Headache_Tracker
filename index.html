<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HeadacheTrack Pro</title>
    
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #2d3436; --accent: #0984e3; --tension: #e67e22; --text: #2d3436; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #1a1a1a; --card: #2d2d2d; --text: #f0f0f0; --accent: #74b9ff; --tension: #ffb142; }
        }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 18px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 1.5rem; }
        h2 { font-size: 0.9rem; margin-bottom: 12px; opacity: 0.7; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(95px, 1fr)); gap: 10px; margin-bottom: 20px; }
        button { border: none; padding: 14px 8px; border-radius: 12px; background: #dfe6e9; color: #2d3436; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        button.active { background: var(--accent); color: white; transform: scale(0.96); }
        .btn-tension.active { background: var(--tension); }
        .btn-main { background: var(--accent); color: white; width: 100%; font-size: 1.1rem; padding: 18px; border-radius: 15px; border: none; font-weight: bold; margin-bottom: 10px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid rgba(0,0,0,0.1); padding-bottom: 30px; }
        .tab-item { flex: 1; text-align: center; padding: 15px; font-size: 0.9rem; opacity: 0.4; font-weight: bold; cursor: pointer; }
        .tab-item.active { opacity: 1; color: var(--accent); }
        .page { display: none; } .page.active { display: block; }
        
        /* PDF specific styling - only visible during export */
        #pdf-export-container { width: 800px; padding: 40px; background: white; color: black; display: none; }
        #pdf-export-container table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        #pdf-export-container th, #pdf-export-container td { border: 1px solid #ddd; padding: 10px; text-align: left; color: black; }
    </style>
</head>
<body>

<div class="container">
    <div id="logPage" class="page active">
        <h1 id="logTitle">Log Headache</h1>
        <div class="card">
            <h2>Type</h2>
            <div class="grid" id="typeGrid">
                <button onclick="setVal('type', 'Migraine', this)">Migraine</button>
                <button onclick="setVal('type', 'Tension', this)" class="btn-tension">Tension</button>
            </div>
            <h2>Severity (1-5)</h2>
            <div class="grid" id="sevGrid">
                <button onclick="setVal('sev', 1, this)">1</button>
                <button onclick="setVal('sev', 2, this)">2</button>
                <button onclick="setVal('sev', 3, this)">3</button>
                <button onclick="setVal('sev', 4, this)">4</button>
                <button onclick="setVal('sev', 5, this)">5</button>
            </div>
            <h2>Medication</h2>
            <div class="grid" id="medGrid">
                <button onclick="toggleMed('Zomig', this)">Zomig</button>
                <button onclick="toggleMed('Solpadeine', this)">Solpadeine</button>
                <button onclick="toggleMed('Paracetamol', this)">Paracetamol</button>
                <button onclick="toggleMed('Medocalm', this)">Medocalm</button>
                <button onclick="toggleMed('Temesta', this)">Temesta</button>
                <button onclick="toggleMed('Eletriptan', this)">Eletriptan</button>
                <button onclick="toggleMed('None', this)">None</button>
            </div>
            <button id="mainSaveBtn" class="btn-main" onclick="saveLog()">Save Status</button>
        </div>
    </div>

    <div id="historyPage" class="page">
        <h1>History</h1>
        <div class="card" id="historyList">Loading...</div>
    </div>

    <div id="reportPage" class="page">
        <h1>Analysis</h1>
        <div class="card"><h2>Daily Severity</h2><canvas id="uiTimelineChart"></canvas></div>
        <div class="card"><h2>Monthly Totals</h2><canvas id="uiMonthlyChart"></canvas></div>
        <button id="pdfBtn" class="btn-main" onclick="generatePDF()">Export PDF Report</button>
    </div>
</div>

<!-- CONTAINER FOR PDF (Visible only during export) -->
<div id="pdf-export-container">
    <h1 style="color:black">Headache Clinical Report</h1>
    <div id="pdf-charts"></div>
    <table id="pdfTable">
        <thead><tr><th>DATE</th><th>TYPE</th><th>SEV</th><th>MEDICATION</th></tr></thead>
        <tbody id="pdfTableBody"></tbody>
    </table>
</div>

<nav class="tab-bar">
    <div class="tab-item active" onclick="nav('logPage', this)">Log</div>
    <div class="tab-item" onclick="nav('historyPage', this)">History</div>
    <div class="tab-item" onclick="nav('reportPage', this)">Report</div>
</nav>

<script>
    // 1. PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Active"));
    }

    const db = new Dexie("HeadacheTrackerDB_V6");
    db.version(1).stores({ logs: '++id, date, type, sev, med' });

    let entry = { id: null, type: '', sev: 0, med: [] };

    function setVal(f, v, el) {
        entry[f] = v;
        el.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function toggleMed(v, el) {
        if (v === 'None') {
            entry.med = ['None'];
            el.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        } else {
            entry.med = entry.med.filter(m => m !== 'None');
            document.querySelectorAll('#medGrid button').forEach(b => { if(b.innerText==='None') b.classList.remove('active'); });
            if (entry.med.includes(v)) { entry.med = entry.med.filter(m => m !== v); el.classList.remove('active'); }
            else { entry.med.push(v); el.classList.add('active'); }
        }
    }

    async function saveLog() {
        if (!entry.type || !entry.sev) return alert("Select Type and Severity");
        await db.logs.add({ ...entry, date: new Date() });
        alert("Saved!");
        location.reload();
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if (id === 'historyPage') renderHistory();
        if (id === 'reportPage') renderAllCharts();
    }

    async function renderHistory() {
        const logs = await db.logs.orderBy('date').reverse().toArray();
        const container = document.getElementById('historyList');
        container.innerHTML = logs.map(l => `
            <div class="history-item">
                <div><strong>${new Date(l.date).toLocaleDateString()}</strong> - ${l.type}</div>
                <div>S:${l.sev} | <button onclick="deleteEntry(${l.id})" style="color:red; background:none; font-weight:bold">Del</button></div>
            </div>
        `).join('');
    }

    async function deleteEntry(id) {
        if (confirm("Delete?")) { await db.logs.delete(id); renderHistory(); }
    }

    let charts = {};
    async function renderAllCharts() {
        const logs = await db.logs.orderBy('date').toArray();
        drawTimeline(logs, 'uiTimelineChart');
        drawMonthlySummary(logs, 'uiMonthlyChart');
    }

    function drawTimeline(logs, canvasId) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (charts[canvasId]) charts[canvasId].destroy();
        const labels = [...new Set(logs.map(l => new Date(l.date).toLocaleDateString()))];
        charts[canvasId] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Migraine', data: labels.map(d => logs.find(l => new Date(l.date).toLocaleDateString() === d && l.type === 'Migraine')?.sev || null), borderColor: '#0984e3', spanGaps: true },
                    { label: 'Tension', data: labels.map(d => logs.find(l => new Date(l.date).toLocaleDateString() === d && l.type === 'Tension')?.sev || null), borderColor: '#e67e22', spanGaps: true }
                ]
            },
            options: { scales: { y: { min: 0, max: 5, ticks: { stepSize: 1 } } } }
        });
    }

    function drawMonthlySummary(logs, canvasId) {
        const summary = {};
        logs.forEach(l => {
            const m = new Date(l.date).toLocaleString('default', { month: 'short', year: 'numeric' });
            if (!summary[m]) summary[m] = { Migraine: 0, Tension: 0 };
            summary[m][l.type]++;
        });
        const labels = Object.keys(summary);
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (charts[canvasId]) charts[canvasId].destroy();
        charts[canvasId] = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Migraines', data: labels.map(l => summary[l].Migraine), backgroundColor: '#0984e3' },
                    { label: 'Tension', data: labels.map(l => summary[l].Tension), backgroundColor: '#e67e22' }
                ]
            },
            options: { scales: { y: { ticks: { stepSize: 1 } } } }
        });
    }

    async function generatePDF() {
        const btn = document.getElementById('pdfBtn');
        btn.innerText = "Processing...";
        
        const logs = await db.logs.orderBy('date').reverse().toArray();
        document.getElementById('pdfTableBody').innerHTML = logs.map(l => `
            <tr><td>${new Date(l.date).toLocaleDateString()}</td><td>${l.type}</td><td>${l.sev}</td><td>${l.med.join(', ')}</td></tr>
        `).join('');

        // Use Chart.js toImage() to get clean images instead of screen captures
        const timelineImg = document.getElementById('uiTimelineChart').toDataURL('image/png');
        const monthlyImg = document.getElementById('uiMonthlyChart').toDataURL('image/png');

        const pdfContainer = document.getElementById('pdf-export-container');
        pdfContainer.style.display = 'block'; // Momentarily show for capture
        
        const canvas = await html2canvas(pdfContainer, { scale: 2 });
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        // Add Graphs Manually to ensure they aren't blank
        doc.text("Headache Clinical Report", 15, 20);
        doc.addImage(timelineImg, 'PNG', 15, 30, 180, 80);
        doc.addImage(monthlyImg, 'PNG', 15, 120, 180, 80);
        
        // Add Table using a new page or below graphs
        doc.addPage();
        doc.text("Detailed History Table", 15, 20);
        const tableCanvas = await html2canvas(document.getElementById('pdfTable'), { scale: 2 });
        doc.addImage(tableCanvas.toDataURL('image/png'), 'PNG', 15, 30, 180, 0);

        doc.save("Headache_Report.pdf");
        pdfContainer.style.display = 'none';
        btn.innerText = "Export PDF Report";
    }
</script>
</body>
</html>
